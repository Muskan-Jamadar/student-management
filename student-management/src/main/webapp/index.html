<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    min-height:100vh;
    padding:30px;
}

.container{
    width:95%;
    max-width:1200px;
    margin:auto;
}

h1{
    color:white;
    text-align:center;
    margin-bottom:25px;
}

.card{
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

input{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

.buttons{
    margin-top:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-size:15px;
    transition:.3s;
}

.add{background:#28a745;}
.update{background:#007bff;}
.clear{background:#6c757d;}

button:hover{
    transform:scale(1.05);
}

.search-box{
    margin:25px 0;
}

.search-box input{
    width:100%;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#007bff;
    color:white;
}

th,td{
    padding:12px;
    border:1px solid #ddd;
    text-align:center;
}

tr:nth-child(even){
    background:#f5f5f5;
}

.delete{
    background:red;
    padding:8px 15px;
}

.edit{
    background:orange;
    padding:8px 15px;
}

@media(max-width:700px){
table{
display:block;
overflow-x:auto;
}
}
</style>

</head>
<body>

<div class="container">

<h1>🎓 Student Management System</h1>

<div class="card">

<div class="form-grid">

<input type="text" id="id" placeholder="Student ID">

<input type="text" id="name" placeholder="Student Name">

<input type="email" id="email" placeholder="Email">

<input type="text" id="course" placeholder="Course">

<input type="number" id="marks" placeholder="Marks">

</div>

<div class="buttons">

<button class="add" onclick="addStudent()">Add Student</button>

<button class="update" onclick="updateStudent()">Update Student</button>

<button class="clear" onclick="clearForm()">Clear</button>

</div>

<div class="search-box">
<input type="text" id="search" placeholder="Search Student..." onkeyup="searchStudent()">
</div>

<table>

<thead>

<tr>

<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Course</th>
<th>Marks</th>
<th>Edit</th>
<th>Delete</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

<script>

let students = JSON.parse(localStorage.getItem("students")) || [];
let selectedIndex = -1;

displayStudents();

function addStudent(){

let id=document.getElementById("id").value.trim();
let name=document.getElementById("name").value.trim();
let email=document.getElementById("email").value.trim();
let course=document.getElementById("course").value.trim();
let marks=document.getElementById("marks").value.trim();

if(id==""||name==""||email==""||course==""||marks==""){
alert("Please fill all fields");
return;
}

students.push({
id,name,email,course,marks
});

saveData();

clearForm();

}

function displayStudents(){

let data="";

students.forEach((s,index)=>{

data+=`

<tr>

<td>${s.id}</td>

<td>${s.name}</td>

<td>${s.email}</td>

<td>${s.course}</td>

<td>${s.marks}</td>

<td><button class="edit" onclick="editStudent(${index})">Edit</button></td>

<td><button class="delete" onclick="deleteStudent(${index})">Delete</button></td>

</tr>

`;

});

document.getElementById("tableBody").innerHTML=data;

}

function editStudent(index){

selectedIndex=index;

let s=students[index];

document.getElementById("id").value=s.id;
document.getElementById("name").value=s.name;
document.getElementById("email").value=s.email;
document.getElementById("course").value=s.course;
document.getElementById("marks").value=s.marks;

}

function updateStudent(){

if(selectedIndex==-1){

alert("Select student first");

return;

}

students[selectedIndex]={

id:document.getElementById("id").value,
name:document.getElementById("name").value,
email:document.getElementById("email").value,
course:document.getElementById("course").value,
marks:document.getElementById("marks").value

};

saveData();

clearForm();

selectedIndex=-1;

}

function deleteStudent(index){

if(confirm("Delete Student?")){

students.splice(index,1);

saveData();

}

}

function clearForm(){

document.getElementById("id").value="";
document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("course").value="";
document.getElementById("marks").value="";

}

function searchStudent(){

let value=document.getElementById("search").value.toLowerCase();

let rows=document.querySelectorAll("#tableBody tr");

rows.forEach(row=>{

let text=row.innerText.toLowerCase();

row.style.display=text.includes(value)?"":"none";

});

}

function saveData(){

localStorage.setItem("students",JSON.stringify(students));

displayStudents();

}

</script>

</body>
</html>
